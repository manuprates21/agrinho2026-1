<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial; padding: 20px; margin: 0; }
        h2 { color: #2d5016; margin-bottom: 20px; }
        .grade {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .produto {
            border: 1px solid #ccc;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .produto img {
            width: 100px;
            height: 150px;
            object-fit: cover;
            margin-bottom: 10px;
            border-radius: 4px;
        }
        .produto h3 { margin: 10px 0; color: #333; }
        .produto p { font-size: 18px; font-weight: bold; margin-bottom: 15px; color: #2d5016; }
        button {
            background-color: #2d5016;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #234010; }
    </style>
</head>
<body>
    <h2 style="color:#2d5016;">Produtos</h2>
    <div class="grade">
        <div class="produto">
            <img src="https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?q=80&w=400" alt="Drone Agrícola">
            <h3>Drone Agrícola</h3>
            <p>R$ 85.000,00</p>
            <button onclick="alert('Adicionado ao carrinho!')">Adicionar</button>
        </div>

        <div class="produto">
            <img src="https://images.unsplash.com/photo-1625246333195-78d9c38ad449?q=80&w=400" alt="Sensor de Solo">
            <h3>Sensor de Solo</h3>
            <p>R$ 1.200,00</p>
            <button onclick="alert('Adicionado ao carrinho!')">Adicionar</button>
        </div>

        <div class="produto">
            <img src="https://images.unsplash.com/photo-1607848477472-3b8236943c01?q=80&w=400" alt="GPS para Trator">
            <h3>GPS para Trator</h3>
            <p>R$ 15.000,00</p>
            <button onclick="alert('Adicionado ao carrinho!')">Adicionar</button>
        </div>
    </div>
</body>
</html>
