<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial; padding: 20px; margin: 0; }
        h2 { color: #2d5016; margin-bottom: 20px; }
        .grade {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }
        .grade img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            transition: transform 0.3s;
        }
        .grade img:hover { transform: scale(1.05); }
    </style>
    <link rel="stylesheet" 
    href="acessibilidade.css">
</head>
<body>
    <h2 style="color:#2d5016;">Galeria</h2>
    <!-- Seção Galeria -->
<section class="galeria">
  <h2>Galeria</h2>

  <div class="grade-galeria">
    <!-- Imagem 1 -->
    <div class="item-galeria">
      <img src="imagens/tecnologia-campo.jpg" alt="Tecnologia aplicada no campo" loading="lazy">
      <p>Tecnologia no campo</p>
    </div>

    <!-- Imagem 2 -->
    <div class="item-galeria">
      <img src="imagens/agricultura-moderna.jpg" alt="Agricultura moderna e sustentável" loading="lazy">
      <p>Agricultura moderna</p>
    </div>

    <!-- Imagem 3 -->
    <div class="item-galeria">
      <img src="imagens/drones-lavoura.jpg" alt="Drones monitorando a lavoura" loading="lazy">
      <p>Drones na lavoura</p>
    </div>

    <!-- Imagem 4 -->
    <div class="item-galeria">
      <img src="imagens/sensores-campo.jpg" alt="Sensores de solo e clima" loading="lazy">
      <p>Sensores de campo</p>
    </div>

    <!-- Imagem 5 -->
    <div class="item-galeria">
      <img src="imagens/irrigacao-inteligente.jpg" alt="Sistema de irrigação inteligente" loading="lazy">
      <p>Irrigação inteligente</p>
    </div>

    <!-- Imagem 6 -->
    <div class="item-galeria">
      <img src="imagens/estufa-automatizada.jpg" alt="Estufa com controle automatizado" loading="lazy">
      <p>Estufa automatizada</p>
    </div>

    <!-- Imagem 7 -->
    <div class="item-galeria">
      <img src="imagens/dados-agricolas.jpg" alt="Análise de dados na produção rural" loading="lazy">
      <p>Dados e precisão</p>
    </div>

    <!-- Imagem 8 -->
    <div class="item-galeria">
      <img src="imagens/agroecologia.jpg" alt="Combinação de tecnologia e preservação" loading="lazy">
      <p>Tecnologia e natureza</p>
    </div>
  </div>
</section>
