<!DOCTYPE html>
<html lang="pt-BR">
    <head> 
        <meta charset="UTF-8">
        <META name="viewport" content="width=device-width, initial-scale=1.0">
            <title>TEC-AGROCAMP</title>
            <style>
                * { margin: 0; padding: 0; box-sizing: border-box;}
                 body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }
        header {
            background-color: #2d5016;
            color: white;
            text-align: center;
            padding: 25px;
        }
        header h1 { font-size: 32px; }
        nav {
            background-color: #2d5016;
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 10px;
            flex-wrap: wrap;
        }
        nav button {
            background: transparent;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            transition: background 0.3s;
        }
        nav button.ativo { background-color: rgba(255,255,255,0.2); }
        nav button:hover { background-color: rgba(255,255,255,0.15); }
        main {
            max-width: 1100px;
            margin: 20px auto;
            background: white;
            border-radius: 8px;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 700px;
            border: none;
            display: block;
        }
    </style>
    <link rel="stylesheet" 
    href="acessibilidade.css">
</head>
<body>
    <header><h1>TEC-AGROCAMP</h1></header>

    <nav>
        <button onclick="trocarAba('inicio')" class="ativo">Início</button>
        <button onclick="trocarAba('importancia')">Importância</button>
        <button onclick="trocarAba('produtos')">Produtos</button>
        <button onclick="trocarAba('porque')">Por que</button>
        <button onclick="trocarAba('galeria')">Galeria</button>
    </nav>

    <main>
        <!-- ESSENCIAL: iframe que carrega as páginas -->
        <iframe id="tela" src="inicio.html"></iframe>
    </main>

    <script>
        function trocarAba(pagina) {
            // Carrega a página correta
            document.getElementById('tela').src = pagina + '.html';
            
            // Remove classe ativo de todos os botões
            document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('ativo'));
            
            // Adiciona classe ativo no botão clicado
            event.currentTarget.classList.add('ativo');
        }
    </script>
</body>
</html>
